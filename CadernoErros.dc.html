<x-dc>
<div style="font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:20px 16px;max-width:960px;margin:0 auto">

  <!-- Header + botao adicionar -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
    <div>
      <div style="font-size:18px;font-weight:800;color:#16203a">Caderno de Erros</div>
      <div style="font-size:12px;color:#94a3b8;margin-top:2px">{{ totalLabel }}</div>
    </div>
    <button onclick="{{ onShowForm }}" style="background:#2551c3;color:#fff;border:none;border-radius:9px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer">+ Adicionar erro</button>
  </div>

  <!-- Formulario adicionar -->
  <sc-if value="{{ showForm }}" hint-placeholder-val="">
    <div style="background:#fff;border:1.5px solid #c7d7f5;border-radius:14px;padding:18px 20px;margin-bottom:16px">
      <div style="font-size:13px;font-weight:700;color:#16203a;margin-bottom:14px">Registrar erro</div>
      <div style="display:grid;gap:10px;grid-template-columns:1fr 1fr;margin-bottom:10px">
        <div>
          <div style="font-size:11px;font-weight:600;color:#64748b;margin-bottom:4px">Materia</div>
          <select oninput="{{ onFormMat }}" style="width:100%;height:36px;border:1.5px solid #e2e8f0;border-radius:8px;padding:0 10px;font-size:13px;background:#fff">
            <option value="">Selecione...</option>
            <sc-for list="{{ formMaterias }}" as="fm">
              <option value="{{ fm.name }}" {{ fm.selected }}>{{ fm.name }}</option>
            </sc-for>
          </select>
        </div>
        <div>
          <div style="font-size:11px;font-weight:600;color:#64748b;margin-bottom:4px">Assunto</div>
          <input value="{{ formTema }}" oninput="{{ onFormTema }}" placeholder="Ex: Controle de constitucionalidade" style="width:100%;height:36px;border:1.5px solid #e2e8f0;border-radius:8px;padding:0 10px;font-size:13px;box-sizing:border-box">
        </div>
      </div>
      <div style="margin-bottom:10px">
        <div style="font-size:11px;font-weight:600;color:#64748b;margin-bottom:4px">Enunciado / O que errei</div>
        <textarea oninput="{{ onFormDesc }}" placeholder="Descreva o erro, o conceito que confundiu, ou cole o enunciado da questao..." rows="3" style="width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 10px;font-size:13px;box-sizing:border-box;resize:vertical;font-family:inherit">{{ formDesc }}</textarea>
      </div>
      <div style="margin-bottom:14px">
        <div style="font-size:11px;font-weight:600;color:#64748b;margin-bottom:4px">Por que errei / Revisao (opcional)</div>
        <textarea oninput="{{ onFormNota }}" placeholder="Anote a logica correta, a regra, o mnemônico..." rows="2" style="width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 10px;font-size:13px;box-sizing:border-box;resize:vertical;font-family:inherit">{{ formNota }}</textarea>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="{{ onSaveEntry }}" style="background:#2551c3;color:#fff;border:none;border-radius:9px;padding:10px 22px;font-size:13px;font-weight:700;cursor:pointer">Salvar</button>
        <button onclick="{{ onCancelForm }}" style="background:#f1f5f9;color:#64748b;border:none;border-radius:9px;padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer">Cancelar</button>
      </div>
    </div>
  </sc-if>

  <!-- Filtro por materia -->
  <sc-if value="{{ hasEntries }}" hint-placeholder-val="{{ true }}">
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
      <sc-for list="{{ filterBtns }}" as="fb">
        <button onclick="{{ fb.onClick }}" style="{{ fb.style }}">{{ fb.label }}</button>
      </sc-for>
    </div>

    <sc-for list="{{ entries }}" as="e">
      <div style="background:#fff;border:1.5px solid #e6ecf7;border-left:4px solid {{ e.color }};border-radius:12px;padding:14px 16px;margin-bottom:10px">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-wrap:wrap">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
              <span style="font-size:11px;font-weight:700;padding:2px 9px;border-radius:6px;background:{{ e.matBg }};color:{{ e.color }}">{{ e.materia }}</span>
              <sc-if value="{{ e.tema }}" hint-placeholder-val="">
                <span style="font-size:11px;color:#64748b;font-weight:500">{{ e.tema }}</span>
              </sc-if>
              <span style="font-size:10px;color:#94a3b8;margin-left:auto">{{ e.date }}</span>
            </div>
            <div style="font-size:13px;color:#16203a;line-height:1.5;margin-bottom:6px">{{ e.desc }}</div>
            <sc-if value="{{ e.nota }}" hint-placeholder-val="">
              <div style="background:#f0fdf4;border-radius:8px;padding:8px 10px;font-size:12px;color:#16203a;line-height:1.5;border-left:3px solid #16a34a">{{ e.nota }}</div>
            </sc-if>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px">
            <button onclick="{{ e.onToggleReviewed }}" style="padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid {{ e.reviewBorder }};background:{{ e.reviewBg }};color:{{ e.reviewColor }}">{{ e.reviewLabel }}</button>
            <button onclick="{{ e.onRemove }}" style="padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid #fecaca;background:#fef2f2;color:#dc2626">Remover</button>
          </div>
        </div>
      </div>
    </sc-for>
  </sc-if>

  <sc-if value="{{ noEntries }}" hint-placeholder-val="">
    <div style="text-align:center;padding:48px 20px;color:#94a3b8">
      <div style="font-size:36px;margin-bottom:10px">📔</div>
      <div style="font-weight:600;color:#16203a;margin-bottom:4px">Caderno vazio</div>
      <div style="font-size:13px">Quando errar uma questao, adicione aqui para revisar depois.</div>
    </div>
  </sc-if>

</div>
</x-dc>
<script data-dc-script>
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.state = {
      showForm: false,
      formMat: '', formTema: '', formDesc: '', formNota: '',
      filterMat: 'todas'
    };
  }
  renderVals() {
    var d = this.props.data || {};
    var st = this.state;
    var self = this;
    var entries = d.entries || [];
    var mats = d.materias || [];

    var filtered = st.filterMat === 'todas' ? entries : entries.filter(function(e) { return e.materia === st.filterMat; });
    var usedMats = {};
    entries.forEach(function(e) { if (e.materia) usedMats[e.materia] = true; });

    var filterBtns = [{ label: 'Todas (' + entries.length + ')', onClick: function() { self.setState({ filterMat: 'todas' }); }, style: 'padding:5px 12px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid ' + (st.filterMat === 'todas' ? '#2551c3' : '#e2e8f0') + ';background:' + (st.filterMat === 'todas' ? '#eef2ff' : '#fff') + ';color:' + (st.filterMat === 'todas' ? '#2551c3' : '#64748b') }].concat(
      mats.filter(function(m) { return usedMats[m.name]; }).map(function(m) {
        var active = st.filterMat === m.name;
        return { label: m.name, onClick: (function(n) { return function() { self.setState({ filterMat: n }); }; })(m.name), style: 'padding:5px 12px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid ' + (active ? m.color : '#e2e8f0') + ';background:' + (active ? '#f5f3ff' : '#fff') + ';color:' + (active ? m.color : '#64748b') };
      })
    );

    var matColorMap = {};
    mats.forEach(function(m) { matColorMap[m.name] = m.color; });

    var entryRows = filtered.map(function(e, i) {
      var color = matColorMap[e.materia] || '#2551c3';
      var reviewed = !!e.reviewed;
      return {
        materia: e.materia || 'Geral',
        tema: e.tema || '',
        desc: e.desc || '',
        nota: e.nota || '',
        date: e.date || '',
        color: color,
        matBg: color + '22',
        reviewLabel: reviewed ? 'Revisado' : 'Marcar revisado',
        reviewBg: reviewed ? '#f0fdf4' : '#fff',
        reviewBorder: reviewed ? '#86efac' : '#e2e8f0',
        reviewColor: reviewed ? '#16a34a' : '#64748b',
        onToggleReviewed: (function(eid, rev) { return function() { d.onUpdate && d.onUpdate(eid, { reviewed: !rev }); self.setState({ tick: (self.state.tick || 0) + 1 }); }; })(e.id, reviewed),
        onRemove: (function(eid) { return function() { if (confirm('Remover este erro do caderno?')) d.onRemove && d.onRemove(eid); }; })(e.id)
      };
    });

    var formMaterias = mats.map(function(m) { return { name: m.name, selected: st.formMat === m.name ? 'selected' : '' }; });

    return {
      totalLabel: entries.length + ' erro(s) registrado(s)',
      showForm: st.showForm,
      onShowForm: function() { self.setState({ showForm: true }); },
      onCancelForm: function() { self.setState({ showForm: false, formMat: '', formTema: '', formDesc: '', formNota: '' }); },
      formMaterias: formMaterias,
      formTema: st.formTema,
      formDesc: st.formDesc,
      formNota: st.formNota,
      onFormMat: function(e) { self.setState({ formMat: e.target.value }); },
      onFormTema: function(e) { self.setState({ formTema: e.target.value }); },
      onFormDesc: function(e) { self.setState({ formDesc: e.target.value }); },
      onFormNota: function(e) { self.setState({ formNota: e.target.value }); },
      onSaveEntry: function() {
        if (!st.formDesc.trim()) return;
        var entry = {
          id: Date.now(),
          materia: st.formMat || 'Geral',
          tema: st.formTema.trim(),
          desc: st.formDesc.trim(),
          nota: st.formNota.trim(),
          date: new Date().toLocaleDateString('pt-BR'),
          reviewed: false
        };
        d.onAdd && d.onAdd(entry);
        self.setState({ showForm: false, formMat: '', formTema: '', formDesc: '', formNota: '' });
      },
      filterBtns: filterBtns,
      entries: entryRows,
      hasEntries: entries.length > 0,
      noEntries: entries.length === 0
    };
  }
}
</script>
