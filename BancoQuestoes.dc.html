<x-dc>
<div style="font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:20px 16px;max-width:960px;margin:0 auto">

  <div style="font-size:18px;font-weight:800;color:#16203a;margin-bottom:4px">Banco de Questoes OAB</div>
  <div style="font-size:12px;color:#94a3b8;margin-bottom:20px">Acesse questoes por materia e assunto — direto no QConcursos (banca FGV)</div>

  <sc-for list="{{ materias }}" as="mat">
    <div style="background:#fff;border:1.5px solid #e6ecf7;border-radius:14px;margin-bottom:12px;overflow:hidden">
      <button onclick="{{ mat.onToggle }}" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border:none;background:transparent;cursor:pointer;text-align:left">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <div style="width:10px;height:10px;border-radius:3px;flex-shrink:0;background:{{ mat.color }}"></div>
          <span style="font-size:14px;font-weight:700;color:#16203a">{{ mat.jwName }}</span>
          <span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;background:#f0f4ff;color:#2551c3">{{ mat.temasCount }} assuntos</span>
          <sc-if value="{{ mat.pctLabel }}" hint-placeholder-val="">
            <span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;background:{{ mat.pctBg }};color:{{ mat.pctColor }}">{{ mat.pctLabel }}% acerto</span>
          </sc-if>
        </div>
        <span style="font-size:14px;color:#94a3b8;flex-shrink:0">{{ mat.arrow }}</span>
      </button>
      <sc-if value="{{ mat.open }}" hint-placeholder-val="">
        <div style="border-top:1px solid #f1f5f9;padding:12px 16px 16px">
          <a href="{{ mat.jwUrl }}" target="_blank" style="display:inline-block;margin-bottom:12px;font-size:12px;font-weight:700;color:#fff;background:#2551c3;border-radius:8px;padding:7px 14px;text-decoration:none">Ver todas as questoes de {{ mat.mat }} →</a>
          <div style="display:flex;flex-direction:column;gap:6px">
            <sc-for list="{{ mat.temas }}" as="t">
              <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:#f8fafc;border-radius:9px;gap:8px">
                <span style="font-size:12px;color:#16203a;font-weight:500;flex:1">{{ t.tema }}</span>
                <a href="{{ t.url }}" target="_blank" style="font-size:11px;font-weight:700;color:#2551c3;text-decoration:none;background:#e8f0fd;border-radius:6px;padding:4px 10px;white-space:nowrap;flex-shrink:0">{{ t.q }} questoes →</a>
              </div>
            </sc-for>
          </div>
        </div>
      </sc-if>
    </div>
  </sc-for>

</div>
</x-dc>
<script data-dc-script>
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.state = { open: {} };
  }
  renderVals() {
    var d = this.props.data || {};
    var self = this;
    var st = this.state;
    var materias = (d.materias || []).map(function(mat) {
      var isOpen = !!st.open[mat.mat];
      var pctLabel = mat.pct != null ? mat.pct : null;
      return {
        mat: mat.mat,
        jwName: mat.jwName || mat.mat,
        jwUrl: mat.jwUrl,
        color: mat.color || '#2551c3',
        temasCount: mat.temasCount || (mat.temas || []).length,
        pctLabel: pctLabel,
        pctBg: pctLabel >= 70 ? '#f0fdf4' : pctLabel >= 50 ? '#fffbeb' : '#fef2f2',
        pctColor: pctLabel >= 70 ? '#16a34a' : pctLabel >= 50 ? '#d97706' : '#dc2626',
        arrow: isOpen ? '▲' : '▼',
        open: isOpen,
        onToggle: (function(key) { return function() {
          var o = Object.assign({}, self.state.open);
          o[key] = !o[key];
          self.setState({ open: o });
        }; })(mat.mat),
        temas: (mat.temas || [])
      };
    });
    return { materias: materias };
  }
}
</script>
