  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-top:30px\">\n        <div><div style=\"font-size:30px;font-weight:800;font-family:'Fraunces',serif\">{{ examCountdown }}<\/div><div style=\"font-size:12px;color:rgba(255,255,255,.65)\">dias at\u00e9 a 1\u00aa fase<\/div><\/div>\n        <div style=\"width:1px;background:rgba(255,255,255,.2)\"><\/div>\n        <div><div style=\"font-size:30px;font-weight:800;font-family:'Fraunces',serif\">06/09<\/div><div style=\"font-size:12px;color:rgba(255,255,255,.65)\">data da prova \u00b7 2026<\/div><\/div>\n        <div style=\"width:1px;background:rgba(255,255,255,.2)\"><\/div>\n        <div><div style=\"font-size:30px;font-weight:800;font-family:'Fraunces',serif\">17<\/div><div style=\"font-size:12px;color:rgba(255,255,255,.65)\">disciplinas no plano<\/div><\/div>\n      <\/div>\n    <\/div>\n    <div style=\"position:relative;font-size:12px;color:rgba(255,255,255,.55)\">Mentoria com o Prof. L\u00edbero \u00b7 Preparat\u00f3rio OAB<\/div>\n  <\/div>\n\n  <div style=\"display:flex;align-items:center;justify-content:center;padding:40px;background:#f6f8fd\">\n    <div style=\"width:100%;max-width:380px;animation:floatUp .5s ease\">\n      <div style=\"font-size:24px;font-weight:700;color:#16203a\">Entrar na plataforma<\/div>\n      <div style=\"font-size:13.5px;color:#64748b;margin-top:4px\">Acesse seu painel de estudos OAB.<\/div>\n\n      <div style=\"display:flex;gap:6px;background:#eef2fb;border-radius:12px;padding:5px;margin-top:24px\">\n        <sc-for list=\"{{ loginTabs }}\" as=\"t\" hint-placeholder-count=\"2\">\n          <button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.label }}<\/button>\n        <\/sc-for>\n      <\/div>\n\n      <sc-if value=\"{{ showName }}\" hint-placeholder-val=\"\">\n        <div style=\"margin-top:18px\">\n          <label style=\"font-size:12px;font-weight:600;color:#475569\">Nome completo<\/label>\n          <input value=\"{{ name }}\" oninput=\"{{ onName }}\" placeholder=\"Seu nome\" style=\"width:100%;height:46px;border:1.5px solid #d8e0f0;border-radius:11px;padding:0 14px;font-size:14px;color:#16203a;margin-top:6px;background:#fff\" style-focus=\"outline:none;border-color:#2551c3;box-shadow:0 0 0 3px rgba(37,81,195,.12)\">\n        <\/div>\n      <\/sc-if>\n\n      <div style=\"margin-top:18px\">\n        <label style=\"font-size:12px;font-weight:600;color:#475569\">E-mail<\/label>\n        <input value=\"{{ email }}\" oninput=\"{{ onEmail }}\" placeholder=\"seu@email.com\" style=\"width:100%;height:46px;border:1.5px solid #d8e0f0;border-radius:11px;padding:0 14px;font-size:14px;color:#16203a;margin-top:6px;background:#fff\" style-focus=\"outline:none;border-color:#2551c3;box-shadow:0 0 0 3px rgba(37,81,195,.12)\">\n      <\/div>\n      <div style=\"margin-top:14px\">\n        <label style=\"font-size:12px;font-weight:600;color:#475569\">Senha<\/label>\n        <input value=\"{{ pass }}\" oninput=\"{{ onPass }}\" type=\"password\" placeholder=\"\u2022\u2022\u2022\u2022\u2022\u2022\" style=\"width:100%;height:46px;border:1.5px solid #d8e0f0;border-radius:11px;padding:0 14px;font-size:14px;color:#16203a;margin-top:6px;background:#fff\" style-focus=\"outline:none;border-color:#2551c3;box-shadow:0 0 0 3px rgba(37,81,195,.12)\">\n      <\/div>\n\n      <sc-if value=\"{{ err }}\" hint-placeholder-val=\"\">\n        <div style=\"font-size:12.5px;color:#dc2626;background:#fef2f2;border:1px solid #fecaca;border-radius:9px;padding:8px 12px;margin-top:14px\">{{ err }}<\/div>\n      <\/sc-if>\n\n      <button onclick=\"{{ onLoginSubmit }}\" style=\"width:100%;height:48px;border:none;border-radius:12px;background:linear-gradient(135deg,#21459e,#2f6bd0);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:20px;box-shadow:0 6px 18px rgba(37,81,195,.28)\" style-hover=\"filter:brightness(1.06)\">{{ submitLabel }}<\/button>\n\n      <sc-if value=\"{{ showSwitch }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"margin-top:18px;text-align:center;font-size:13px;color:#64748b yle=\"font-size:13px;font-weight:700;color:#16203a;margin-bottom:4px\">2 \u00b7 Quantas horas por dia de estudo?<\/div>\n    <div style=\"font-size:12.5px;color:#94a3b8;margin-bottom:14px\">Define sua meta de quest\u00f5es: 1h \u2248 20 quest\u00f5es/dia, indo at\u00e9 40. O foco \u00e9 resolver quest\u00f5es; v\u00eddeo-aula e lei seca entram se sobrar tempo.<\/div>\n    <div style=\"display:flex;align-items:center;gap:16px\">\n      <input type=\"range\" min=\"1\" max=\"8\" step=\"1\" value=\"{{ setupHours }}\" oninput=\"{{ onHours }}\" style=\"flex:1;accent-color:#2551c3;height:6px\">\n      <div style=\"min-width:140px;text-align:right\"><span style=\"font-size:26px;font-weight:800;color:#2551c3;font-family:'Fraunces',serif\">{{ setupHours }}h<\/span><span style=\"font-size:12px;color:#94a3b8\"> \u00b7 meta {{ setupGoal }} q/dia<\/span><\/div>\n    <\/div>\n\n    <div style=\"height:1px;background:#eef2fb;margin:24px 0\"><\/div>\n\n    <div style=\"font-size:13px;font-weight:700;color:#16203a;margin-bottom:4px\">3 \u00b7 Dia do simulado semanal<\/div>\n    <div style=\"font-size:12.5px;color:#94a3b8;margin-bottom:14px\">Reservamos um dos seus dias para simulado completo.<\/div>\n    <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n      <sc-for list=\"{{ simOptions }}\" as=\"s\" hint-placeholder-count=\"3\">\n        <button onclick=\"{{ s.onClick }}\" style=\"{{ s.style }}\">{{ s.label }}<\/button>\n      <\/sc-for>\n    <\/div>\n\n    <div style=\"height:1px;background:#eef2fb;margin:24px 0\"><\/div>\n\n    <div style=\"font-size:13px;font-weight:700;color:#16203a;margin-bottom:4px\">4 \u00b7 A partir de quando voc\u00ea come\u00e7a?<\/div>\n    <div style=\"font-size:12.5px;color:#94a3b8;margin-bottom:14px\">Escolha o dia em que seu cronograma come\u00e7a (vai at\u00e9 06/09/2026).<\/div>\n    <input type=\"date\" value=\"{{ setupStart }}\" oninput=\"{{ onStart }}\" min=\"{{ minStart }}\" max=\"2026-09-05\" style=\"width:100%;max-width:240px;height:46px;b n    <sc-for list=\"{{ statCards }}\" as=\"c\" hint-placeholder-count=\"4\">\n      <div style=\"display:flex;align-items:center;gap:12px;padding-right:18px;flex-shrink:0\">\n        <div style=\"width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;background:{{ c.bg }}\">{{ c.icon }}<\/div>\n        <div><div style=\"font-size:22px;font-weight:800;color:#16203a;line-height:1;font-family:'Fraunces',serif\">{{ c.val }}<\/div><div style=\"font-size:12px;color:#94a3b8\">{{ c.label }}<\/div><\/div>\n      <\/div>\n    <\/sc-for>\n  <\/div>\n\n  <sc-if value=\"{{ vCron }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"display:grid;grid-template-columns:1fr 290px;gap:0\">\n    <div style=\"padding:26px 32px\">\n      <div style=\"background:#f6f8fd;border:1px solid #e6ecf7;border-radius:14px;padding:16px 18px;margin-bottom:22px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:10px\">\n          <div style=\"font-size:13px;font-weight:600;color:#16203a\">Progresso geral do cronograma<\/div>\n          <div style=\"font-size:14px;font-weight:800;color:#2551c3\">{{ progPct }}%<\/div>\n        <\/div>\n        <div style=\"background:#e1e9fb;border-radius:99px;height:10px;overflow:hidden\"><div style=\"height:100%;border-radius:99px;background:linear-gradient(90deg,#2551c3,#3a7bd5);width:{{ progPctW }}\"><\/div><\/div>\n      <\/div>\n\n      <div style=\"display:flex;gap:6px;overflow-x:auto;margin-bottom:18px\">\n        <sc-for list=\"{{ monthTabs }}\" as=\"m\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ m.onClick }}\" style=\"{{ m.style }}\">{{ m.label }}<\/button>\n        <\/sc-for>\n      <\/div>\n\n      <sc-for list=\"{{ weeks }}\" as=\"w\" hint-placeholder-count=\"3\">\n        <div style=\"margin-bottom:22px\">\n          <div style=\"font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px\">{{ w.label }}<\/div>\n          <div style=\"display:flex;flex-direction:column;gap:9px\">\n            <sc-for list=\"{{ w.days }}\" as=\"day\" hint-placeholder-count=\"5\">\n              <div style=\"{{ day.cardStyle }}\">\n                <div style=\"display:flex;align-items:center;gap:12px;padding:13px 16px;{{ day.headStyle }}\">\n                  <div style=\"font-size:25px;font-weight:800;min-width:32px;font-family:'Fraunces',serif;color:{{ day.numColor }}\">{{ day.num }}<\/div>\n                  <div style=\"flex:1\"><div style=\"font-size:13px;font-weight:700;color:{{ day.nameColor }}\">{{ day.dayName }}<\/div><div style=\"font-size:11px;color:{{ day.dateColor }}\">{{ day.dateStr }}<\/div><\/div>\n                  <div style=\"display:flex;gap:6px;flex-wrap:wrap\">\n                    <sc-for list=\"{{ day.badges }}\" as=\"b\" hint-placeholder-count=\"1\">\n                      <span style=\"font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;text-transform:uppercase;letter-spacing:.04em;background:{{ b.bg }};color:{{ b.color }}\">{{ b.text }}<\/span>\n                    <\/sc-for>\n                  <\/div>\n                <\/div>\n                <sc-if value=\"{{ day.special }}\" hint-placeholder-val=\"\">\n                  <div style=\"padding:14px 16px;font-size:13.5px;font-weight:600;text-align:center;color:{{ day.specialColor }}\">{{ day.special }}<\/div>\n                <\/sc-if>\n                <sc-if value=\"{{ day.hasBody }}\" hint-placeholder-val=\"\">\n                  <div style=\"padding:10px 16px 14px\">\n                    <sc-if value=\"{{ day.hasQuestao }}\" hint-placeholder-val=\"{{ true }}\">\n                      <div style=\"border:1.5px solid #d8e6ff;background:linear-gradient(135deg,#f3f8ff,#fff);border-radius:13px;padding:14px 15px\">\n                        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap\">\n                          <div style=\"font-size:12px;font-weight:800;color:#2551c3;text-transform:uppercase;letter-spacing:.04em\">{{ day.q.focusLabel }}<\/div>\n                          <sc-if value=\"{{ day.q.hasPractice }}\" hint-placeholder-val=\"{{ true }}\">\n                            <a href=\"{{ day.q.practiceUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"font-size:11.5px;font-weight:700;color:#2551c3;text-decoration:none;background:#e8f0fd;border-radius:8px;padding:5px 11px\" style-hover=\"background:#d8e6ff\">{{ day.q.practiceLabel }}<\/a>\n                          <\/sc-if>\n                        <\/div>\n                        <div style=\"font-size:13.5px;font-weight:600;color:#16203a;line-height:1.35;margin-top:6px\">{{ day.q.metaText }}<\/div>\n                        <div style=\"display:flex;align-items:center;gap:9px;margin-top:12px;flex-wrap:wrap\">\n                          <span style=\"font-size:12px;color:#64748b;font-weight:600\">Acertei<\/span>\n                          <input type=\"number\" value=\"{{ day.q.acertos }}\" oninput=\"{{ day.q.onAcertos }}\" placeholder=\"\u2014\" style=\"width:58px;height:36px;border:1.5px solid #c9d8f2;border-radius:9px;text-align:center;font-size:15px;font-weight:700;color:#16203a;background:#fff\" style-focus=\"outline:none;border-color:#2551c3\">\n                          <span style=\"font-size:14px;color:#94a3b8\">de<\/span>\n                          <sc-if value=\"{{ day.q.totalFixed }}\" hint-placeholder-val=\"\">\n                            <span style=\"font-size:15px;font-weight:800;color:#2551c3\">{{ day.q.totalFixed }}<\/span>\n                          <\/sc-if>\n                          <sc-if value=\"{{ day.q.hasTempo }}\" hint-placeholder-val=\"\">\n                            <span style=\"font-size:13px;color:#94a3b8;margin-left:8px\">\u00b7<\/span>\n                            <input type=\"text\" value=\"{{ day.q.tempo }}\" oninput=\"{{ day.q.onTempo }}\" placeholder=\"hh:mm\" style=\"width:60px;heigh IO':[\n        ['Competencia Tributaria',13],\n        ['Limites Constitucionais ao Poder de Tributar',30],\n        ['Imunidades Tributarias',16],\n        ['Conceito de Tributo e Especies',13],\n        ['Obrigacao Tributaria',19],\n        ['Responsabilidade Tributaria',12],\n        ['Credito Tributario',39]\n      ],\n      'PROCESSO PENAL':[\n        ['Inquerito Policial',16],\n        ['Acao Penal',18],\n        ['Da Prova',21],\n        ['Prisao, Medidas Cautelares e Liberdade Provisoria',19],\n        ['Procedimentos do CPP',28],\n        ['Recursos e Acoes Autonomas de Impugnacao',44]\n      ],\n      'TRABALHO':[\n        ['Relacao de Trabalho',7],\n        ['Contrato de Emprego',5],\n        ['Empregado',10],\n        ['Empregador',7],\n        ['Interrupcao e Suspensao do Contrato de Trabalho',14],\n        ['Alteracao do Contrato de Trabalho',13],\n        ['Duracao do Trabalho',23],\n        ['Ferias',4],\n        ['Estabilidade',11],\n        ['Remuneracao',21],\n        ['Extincao do Contrato de Trabalho',24],\n        ['Aviso Previo',3]\n      ]\n    };\n    const sm={};(C.subjArr||[]).forEach(s=>sm[s.mat]=s);\n    const order=['\u00c9TICA','CIVIL','CONSTITUCIONAL','PENAL','PROCESSO CIVIL','ADMINISTRATIVO','TRIBUT\u00c1RIO','PROCESSO PENAL','TRABALHO','EMPRESARIAL','PROCESSO DO TRABALHO'];\n    return order.map(mat=>{const qc=QC[mat];if(!qc)return null;const disc=qc[1];const list=TAX[mat]||[];\n      const temas=list.map(([nome,q])=>({tema:nome,q,url:base+disc+'/questoes?q='+encodeURIComponent(nome)}));\n      const total=temas.reduce((a,t)=>a+t.q,0);const s=sm[mat]||{};\n      return{mat,color:this.matColor(mat),jwName:qc[0],jwUrl:base+disc+'/questoes',total,temasCount:temas.length,temas,pct:(s.pct==null?null:s.pct),done:s.done||0,days:s.days||0};}).filter(Boolean);\n  }\n  buildAdminData(){\n    const users=this.gp('users',[]);\n    const list=users.map(u=>{const C=this.compute(u.id);return{id:u.id,name:u.name,email:u.email,progPct:C.progPct,taxa:C.taxa,streak:C.streak,adherence:C.adherence,status:C.status,statusColor:C.statusColor,completed:C.completed,studyDays:C.studyDays.length,totalQ:C.totalQ,last:C.last,daysSince:C.daysSince,nota:C.nota,subjArr:C.subjArr,evo:C.evo};});\n    // curriculum overview from TOPICS\n    const cur={};this.TOPICS.forEach(t=>{const m=t[0];if(m==='REVIS\u00c3O')return;if(!cur[m])cur[m]={mat:m,temas:0,q:0,color:this.matColor(m)};cur[m].temas++;cur[m].q+=(t[2]||0);});\n    const curriculum=Object.values(cur).sort((a,b)=>b.q-a.q);\n    return{brandName:this.brandName,settings:this.getSettings(),examDate:this.getSettings().examDate,list,curriculum,matColors:this.MAT_COLORS,\n      onLogout:()=>this.logout(),\n      onSaveSettings:(s)=>this.adminSaveSettings(s),\n      onAddStudent:(name,email)=>this.adminAddStudent(name,email),\n      onUpdateStudent:(id,patch)=>this.adminUpdateStudent(id,patch),\n      onRemoveStudent:(id)=>this.adminRemoveStudent(id),\n      onResetProgress:(id)=>this.adminResetProgress(id),\n      onImpersonate:(id)=>this.adminImpersonate(id),addingStudent:!!this.state.addingStudent};\n  }\n\n  adminSaveSettings(s){\n    const cur=this.getSettings();const next=Object.assign({},cur,s);this.sp('settings',next);\n    const examChanged=cur.examDate!==next.examDate;this.applySettings();\n    if(examChanged){// regenerate every schedule keeping each student's availability\n      this.gp('users',[]).forEach(u=>{const av=this.gp('av_'+u.id,null);if(av){this.sp('sch_'+u.id,this.genSchedule(av));}});\n    }\n    this.setState({tick:this.state.tick+1});\n  }\n  slugId(name){const b=(name||'aluno').toLowerCase().normalize('NFD').replace(/[\\u0300-\\u036f]/g,'').replace(/[^a-z0-9]+/g,'').slice(0,10)||'aluno';let id=b,i=2;const ex=this.gp('users',[]).map(u=>u.id);while(ex.includes(id)){id=b+i;i++;}return id;}\n  adminAddStudent(name,email){\n    if(!name||!name.trim())return;\n    const trimName=name.trim();\n    const trimEmail=((email||'').trim()).toLowerCase();\n    if(!trimEmail){alert('Informe o e-mail do aluno.');return;}\n    const password='oab123';\n    const sb=this._getSb();\n    if(!sb){alert('Supabase n\u00e3o inicializado.');return;}\n    this.setState({addingStudent:true});\n    sb.auth.getSession().then(({data:{session}})=>{\n      const token=session&&session.access_token;\n      if(!token){this.setState({addingStudent:false});alert('Fa\u00e7a login novamente.');return;}\n      fetch('https://qijziqjpvtjwarkodzxp.supabase.co/functions/v1/create-student',{\n        method:'POST',\n        headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},\n        body:JSON.stringify({name:trimName,email:trimEmail,password})\n      }).then(r=>r.json()).then(res=>{\n        this.setState({addingStudent:false});\n        if(res.error){alert('Erro ao criar aluno: '+res.error);return;}\n        const id=res.id;\n        const av={days:[1,2,3,4,5,6],hours:3,simDay:6,start:this.iso(this.TODAY)};\n        this.sp('av_'+id,av);this.sp('sch_'+id,this.genSchedule(av));this.sp('prog_'+id,{});\n        const users=this.gp('users',[]);\n        users.push({id,name:trimName,email:trimEmail,password});\n        this.sp('users',users);\n        this.setState({tick:this.state.tick+1});\n      }).catch(e=>{this.setState({addingStudent:false});alert('Erro de rede: '+e.message);});\n    });\n  }\n  adminUpdateStudent(id,patch){const users=this.gp('users',[]).map(u=>u.id===id?Object.assign({},u,patch):u);this.sp('users',users);this.setState({tick:this.state.tick+1});}\n  adminRemoveStudent(id){const users=this.gp('users',[]).filter(u=>u.id!==id);this.sp('users',users);['av_','sch_','prog_'].forEach(p=>localStorage.removeItem(this.PFX+p+id));this.setState({tick:this.state.tick+1});}\n  adminResetProgress(id){this.sp('prog_'+id,{});this.setState({tick:this.state.tick+1});}\n  adminImpersonate(id){this.sp('session',id);const sch=this.gp('sch_'+id,null);this.setState({uid:id,screen:sch?'student':'setup',view:'cronograma'});}\n\n\n  _getSb(){\n    if(window._sb)return window._sb;\n    if(window.supabase){\n      window._sb=window.supabase.createClient('https://qijziqjpvtjwarkodzxp.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpanppcWpwdnRqd2Fya29kenhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMzY0ODAsImV4cCI6MjA5NTgxMjQ4MH0.TVLDYLvotFie0GDX6zhab9JGs1Vq0JFT0xIBuPXKBhQ');\n      return window._sb;\n    }\n    return null;\n  }\n\n  componentDidMount(){\n    this.applySettings();\n    this.seed();\n    const sess=this.gp('session',null);\n    if(sess){this.resume(sess);}else{this.setState({booted:true});}\n    setTimeout(()=>{\n      const sb=this._getSb();\n      if(!sb)return;\n      sb.auth.getSession().then(({data})=>{\n        if(data&&data.session&&!this.state.uid){\n          this._loadFromSupabase(data.session.user).catch(e=>{console.error('Session restore',e);});\n        }\n      });\n    },500);\n  }\n\n  sp(k,v){\n    try{localStorage.setItem(this.PFX+k,JSON.stringify(v));}catch(e){}\n    this._sbSyncKey(k,v);\n  }\n\n  _sbSyncKey(k,v){\n    const sb=this._getSb();\n    if(!sb||!window._sbUserId)return;\n    const uid=window._sbUserId;\n    if(k==='session'||k==='users'||k==='seeded')return;\n    if(k==='settings'){\n      const obj=v||{};\n      Object.entries(obj).forEach(([key,val])=>{sb.from('oab_settings').upsert({key,value:val}).then(()=>{});});return;\n    }\n    const avM=k.match(/^av_(.+)$/);\n    if(avM&&avM[1]===uid){sb.from('oab_availability').upsert({user_id:uid,days:v.days,hours:v.hours,sim_day:v.simDay??-1,start_date:v.start,updated_at:new Date().toISOString()}).then(()=>{});return;}\n    const schM=k.match(/^sch_(.+)$/);\n    if(schM&&schM[1]===uid){sb.from('oab_schedules').upsert({user_id:uid,data:v,updated_at:new Date().toISOString()}).then(()=>{});return;}\n    const pgM=k.match(/^prog_(.+)$/);\n    if(pgM&&pgM[1]===uid){\n      const entries=Object.entries(v||{}).map(([date,data])=>({user_id:uid,date,data}));\n      if(entries.length){sb.from('oab_progress').upsert(entries,{onConflict:'user_id,date'}).then(()=>{});}return;\n    }\n    const cadM=k.match(/^caderno_(.+)$/);\n    if(cadM&&cadM[1]===uid){sb.from('oab_caderno').upsert({user_id:uid,entries:v||[],updated_at:new Date().toISOString()}).then(()=>{});return;}\n  }\n\n  async onLoginSubmit(){\n    const st=this.state;\n    const email=(st.email||'').trim().toLowerCase();\n    const pass=st.pass||'';\n    const sb=this._getSb();\n    if(!sb){this._origLogin(email,pass);return;}\n    this.setState({err:'Verificando...'});\n    try{\n      let user=null;\n      if(st.authMode==='signup'){\n        if(!st.name.trim()){this.setState({err:'Digite seu nome.'});return;}\n        if(!/^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$/.test(email)){this.setState({err:'E-mail invalido.'});return;}\n        if(pass.length<6){this.setState({err:'Senha precisa de pelo menos 6 caracteres.'});return;}\n        const {data:sd,error:se}=await sb.auth.signUp({email,password:pass,options:{data:{name:st.name.trim(),role:'aluno'}}});\n        if(se){this.setState({err:se.message});return;}\n        if(!sd.session){this.setState({err:'Conta criada! Faca login.'});return;}\n        user=sd.user;\n      } else {\n        const {data:ld,error:le}=await sb.auth.signInWithPassword({email,password:pass});\n        if(le){this.setState({err:'E-mail ou senha invalidos.'});return;}\n        user=ld.user;\n      }\n      await this._loadFromSupabase(user);\n    }catch(err){\n      console.error('Login error:',err);\n      this.setState({err:'Erro: '+err.message});\n    }\n  }\n\n  async _loadFromSupabase(user){\n    const sb=this._getSb();if(!sb)return;\n    window._sbUserId=user.id;\n    const {data:prof}=await sb.from('oab_profiles').select('*').eq('id',user.id).single();\n    const role=(prof&&prof.role)||'aluno';\n    window._sbRole=role;\n    const name=(prof&&prof.name)||user.email.split('@')[0]||'Aluno';\n    if(role==='admin'){\n      try{await this._sbLoadAdmin(sb);}catch(e){console.error('_sbLoadAdmin:',e);}\n      localStorage.setItem(this.PFX+'session','admin');\n      this.setState({booted:true,screen:'admin',uid:'admin',err:''});\n    } else {\n      try{await this._sbLoadStudent(sb,user.id,name,user.email);}catch(e){console.error('_sbLoadStudent:',e);}\n      localStorage.setItem(this.PFX+'session',user.id);\n      const sch=this.gp('sch_'+user.id,null);\n      this.setState({booted:true,uid:user.id,screen:sch?'student':'setup',view:'cronograma',err:''});\n    }\n  }\n\n  async _sbLoadStudent(sb,uid,name,email){\n    try{localStorage.setItem(this.PFX+'users',JSON.stringify([{id:uid,name,email,password:''}]));}catch(e){}\n    try{localStorage.setItem(this.PFX+'seeded',JSON.stringify(true));}catch(e){}\n    const [avR,schR,pgR,cadR]=await Promise.all([\n      sb.from('oab_availability').select('*').eq('user_id',uid).maybeSingle(),\n      sb.from('oab_schedules').select('*').eq('user_id',uid).maybeSingle(),\n      sb.from('oab_progress').select('*').eq('user_id',uid),\n      sb.from('oab_caderno').select('*').eq('user_id',uid).maybeSingle()\n    ]);\n    if(avR.data){try{localStorage.setItem(this.PFX+'av_'+uid,JSON.stringify({days:avR.data.days,hours:avR.data.hours,simDay:avR.data.sim_day,start:avR.data.start_date}));}catch(e){}}\n    if(schR.data&&schR.data.data){try{localStorage.setItem(this.PFX+'sch_'+uid,JSON.stringify(schR.data.data));}catch(e){}}\n    if(pgR.data&&pgR.data.length){const prog={};pgR.data.forEach(r=>{prog[r.date]=r.data;});try{localStorage.setItem(this.PFX+'prog_'+uid,JSON.stringify(prog));}catch(e){}}\n    if(cadR.data){try{localStorage.setItem(this.PFX+'caderno_'+uid,JSON.stringify(cadR.data.entries||[]));}catch(e){}}\n  }\n\n  async _sbLoadAdmin(sb){\n    const {data:profiles}=await sb.from('oab_profiles').select('*').neq('role','admin');\n    const users=(profiles||[]).map(p=>({id:p.id,name:p.name,email:p.email,password:''}));\n    try{localStorage.setItem(this.PFX+'users',JSON.stringify(users));}catch(e){}\n    try{localStorage.setItem(this.PFX+'seeded',JSON.stringify(true));}catch(e){}\n    if(users.length){await Promise.all(users.map(u=>this._sbLoadStudent(sb,u.id,u.name,u.email).catch(e=>console.error('loadStudent:',e))));}\n    this.applySettings();\n  }\n\n  logout(){\n    const sb=this._getSb();\n    if(sb){sb.auth.signOut().catch(()=>{});}\n    window._sbUserId=null;window._sbRole=null;\n    Object.keys(localStorage).filter(k=>k.startsWith(this.PFX)).forEach(k=>localStorage.removeItem(k));\n    this.setState({screen:'login',uid:null,authMode:'login',name:'',email:'',pass:'',err:''});\n  }\n\n  _origLogin(email,pass){\n    const st=this.state;\n    if(st.loginTab==='admin'){const s=this.getSettings();const ae=(s.adminEmail||'admin@libero.com').toLowerCase();const ap=s.adminPass||'admin123';if(email===ae&&pass===ap){this.doLogin('admin','admin');}else{this.setState({err:'E-mail ou senha de administrador incorretos.'});}return;}\n    const users=this.gp('users',[]);\n    if(st.authMode==='signup'){if(!st.name.trim()){this.setState({err:'Digite seu nome.'});return;}if(!/^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$/.test(email)){this.setState({err:'E-mail invalido.'});return;}if(pass.length<4){this.setState({err:'A senha precisa de pelo menos 4 caracteres.'});return;}if(users.some(u=>(u.email||'').toLowerCase()===email)){this.setState({err:'Ja existe uma conta com esse e-mail.'});return;}\n      const id='u'+Date.now().toString(36)+Math.floor(Math.random()*1296).toString(36);users.push({id,name:st.name.trim(),email,password:pass});this.sp('users',users);this.setState({name:'',pass:'',err:''});this.doLogin(id,'aluno');return;}\n    const u=users.find(x=>(x.email||'').toLowerCase()===email);if(u&&u.password===pass){this.setState({err:''});this.doLogin(u.id,'aluno');}else{this.setState({err:'E-mail ou senha invalidos.'});}\n  }\n\n}\n<\/script>\n\n\n<\/body><\/html>"</script>
